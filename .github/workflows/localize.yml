name: Localize

# PR-driven continuous localization (lingo.dev CLI — Apache-2.0, BYO-LLM,
# no platform account). resources/en is the only hand-edited locale; every
# other locale is a generated artifact. The committed i18n.lock
# fingerprints each source string, so only new or changed keys are
# re-translated — existing translations never drift between runs.
#
# The whole system: every open PR that touches English copy gets its
# missing translations generated and offered back as a PR targeting that
# PR's branch. The bot branch name is unique per run (PR number + run id
# + attempt), so branches can never clash and no human branch is ever
# pushed to. Merging the bot PR folds the translations into the open PR;
# ignoring it costs nothing.
#
# Translation runs on Grok through xAI's OpenAI-compatible API, reusing
# the XAI_API_KEY secret that already powers the Grok fallow review.
# lingo.dev's config-level baseUrl is dropped upstream (it passes
# `baseUrl` where the AI SDK expects `baseURL`), so the redirect to x.ai
# rides the SDK's OPENAI_BASE_URL env var instead. The `run` subcommand
# is deliberate: `ci` gates on a Lingo.dev platform key before it ever
# looks at the BYO provider and exits 0 without translating.
#
# Structural safety (key-tree parity, locked brand terms, placeholder
# preservation) is enforced by the i18n test suite in Code Quality.
on:
  pull_request:
    paths:
      - "apps/website/src/i18n/resources/en/**"
      - "apps/website/i18n.json"
      - ".github/workflows/localize.yml"

# A newer push to the same PR supersedes any in-flight translation run.
concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write # pushes the unique localize/* bot branch
  pull-requests: write # opens the translations PR, comments on the source PR

jobs:
  localize:
    name: Localize
    # never react to a bot translations PR — belt and braces on top of the
    # paths filter (bot PRs only touch generated locales and the lockfile)
    if: ${{ !startsWith(github.head_ref, 'localize/') }}
    runs-on: ubuntu-latest
    # generous: a from-scratch pass translates every resource file into
    # every target locale; incremental runs finish in a couple of minutes
    timeout-minutes: 45
    env:
      # Fork PRs get no secrets, so the guard below skips them naturally.
      OPENAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      OPENAI_BASE_URL: https://api.x.ai/v1
    steps:
      - name: Guard — no API key configured
        if: env.OPENAI_API_KEY == ''
        run: echo "::notice::XAI_API_KEY secret not set — skipping localization."
      # Checked early, before any translation work: if a translations PR
      # for this source PR is already open, this run updates its branch
      # in place instead of opening another one.
      - name: Find an existing translations PR
        if: env.OPENAI_API_KEY != ''
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_PR: ${{ github.event.pull_request.number }}
          SOURCE_BRANCH: ${{ github.head_ref }}
        run: |
          BRANCH=$(gh pr list --repo "$GITHUB_REPOSITORY" --state open \
            --base "$SOURCE_BRANCH" --json headRefName \
            --jq "[.[].headRefName | select(startswith(\"localize/pr${SOURCE_PR}-\"))][0] // empty")
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          if [ -n "$BRANCH" ]; then
            echo "Existing translations PR found — will update branch $BRANCH"
          else
            echo "No open translations PR for #${SOURCE_PR} — a new one will be created if needed"
          fi
      - uses: actions/checkout@v4
        if: env.OPENAI_API_KEY != ''
        with:
          # the PR's branch itself, not the ephemeral merge ref — the
          # translations PR must target a real branch
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        if: env.OPENAI_API_KEY != ''
        with:
          node-version-file: .nvmrc
      - name: Translate new and changed keys
        if: env.OPENAI_API_KEY != ''
        working-directory: apps/website
        run: npx --yes lingo.dev@0.138.0 run --concurrency 10
      - name: Offer the translations as a PR onto the source PR
        if: env.OPENAI_API_KEY != ''
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_PR: ${{ github.event.pull_request.number }}
          SOURCE_BRANCH: ${{ github.head_ref }}
        run: |
          CHANGES=$(git status --porcelain -- apps/website/src/i18n/resources apps/website/i18n.lock)
          if [ -z "$CHANGES" ]; then
            echo "Translations already up to date for PR #${SOURCE_PR}."
            exit 0
          fi
          FILES=$(echo "$CHANGES" | wc -l)

          BRANCH="${{ steps.existing.outputs.branch }}"
          if [ -z "$BRANCH" ]; then
            # unique by construction: run id is global, attempt covers re-runs
            BRANCH="localize/pr${SOURCE_PR}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
            NEW_PR=1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # branch is rebuilt from the source PR's current head each run,
          # so force-push is the correct mode for the update case
          git checkout -b "$BRANCH"
          git add apps/website/src/i18n/resources apps/website/i18n.lock
          git commit -m "i18n: translations for PR #${SOURCE_PR}"
          git push --force origin "$BRANCH"

          if [ -n "${NEW_PR:-}" ]; then
            PR_URL=$(gh pr create --base "$SOURCE_BRANCH" --head "$BRANCH" \
              --title "i18n: translations for #${SOURCE_PR}" \
              --body "Generated translations for the English copy changed in #${SOURCE_PR} (${FILES} file(s)). resources/en is the source of truth — review and merge to fold these into your branch.")
            gh pr comment "$SOURCE_PR" \
              --body "Translations for this PR are ready in ${PR_URL} (${FILES} file(s))."
          else
            PR_URL=$(gh pr list --repo "$GITHUB_REPOSITORY" --state open \
              --head "$BRANCH" --json url --jq '.[0].url')
            gh pr comment "$SOURCE_PR" \
              --body "Updated the existing translations PR ${PR_URL} (${FILES} file(s))."
          fi
