name: Deploy to GitHub Pages

# The published site tracks releases, not the trunk: it deploys only when
# work lands on `release` (the same trigger that publishes the npm package),
# so the live site and the released package always move together and a
# rollback is a re-run of an earlier release. Manual dispatch stays for
# out-of-band redeploys.
on:
  push:
    branches: [release]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # The website's prebuild snapshots @creact-labs/creact's dist into the
      # playground runtime manifest, so the package must be built first.
      - name: Build CReact
        run: npm run build -w packages/creact

      - name: Build
        working-directory: apps/website
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/website/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
