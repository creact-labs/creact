name: Release

# Standardized release flow:
#   1. Land work on develop (the trunk; Quality Gate runs on every push/PR).
#   2. Bump the version of each package you intend to release, in its own
#      package.json on develop. Packages version independently.
#   3. Open a PR develop → release; merging it is the release action.
#   4. This workflow re-runs the full quality gate on release (the same
#      code-quality workflow every PR runs — which already builds and validates
#      each package as published), then runs the SAME publish-packages.sh script
#      the gate runs, only with DRY_RUN=false: it publishes `<name>@<version>`
#      to npm, tags `<name>@<version>`, and cuts a GitHub Release. Each artifact
#      is reconciled independently per package (nothing keyed off another
#      package's version), so any partial state converges to the correct end
#      state on every run and a re-run with nothing new is a clean no-op.
#
# Requires the NPM_TOKEN repository secret (npm automation token).

on:
  push:
    branches: [release]

# No workflow-level grants: repository-controlled code runs in these jobs, so
# write and OIDC permissions are scoped to the publish job only.
permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  quality:
    name: Quality
    permissions:
      contents: read
      # Superset required by the called workflow's PR-only Grok job (it
      # skips on push-triggered release runs, but the caller's grant must
      # still cover every permission the called workflow declares)
      pull-requests: write
    secrets: inherit
    uses: ./.github/workflows/code-quality.yml

  publish:
    name: Publish
    needs: [quality]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # git tags + GitHub Releases
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
        with:
          # npm lifecycle scripts run below — never leave the token in
          # .git/config. Tags/releases go through the API with GH_TOKEN; tag
          # existence is read anonymously (public repo). No persisted git creds.
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      # The SAME script the quality gate runs (DRY_RUN there); here DRY_RUN is
      # false, so after the identical build + validation it also publishes, tags,
      # and releases each package idempotently.
      - name: Build, publish, tag, and release each package
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          DRY_RUN: "false"
        run: bash .github/scripts/publish-packages.sh
