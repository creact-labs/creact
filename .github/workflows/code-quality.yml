name: Code Quality

on:
  workflow_dispatch:
  # Reusable trigger so release.yml can gate publishing on this workflow.
  workflow_call:
  # PR-only by design: direct pushes to develop run nothing. The gate runs
  # once, on the PR into release (or develop), and again on the release
  # branch itself via release.yml's workflow_call after the merge.
  pull_request:
    branches: [develop, release]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # Enumerate every workspace and the tasks it defines, so typecheck/build/test
  # fan out over ALL packages — nothing hardcoded. This is what stops a package
  # (e.g. packages/testing) from being built at release time but never in CI.
  # Add a package and it is covered automatically. Each entry also carries the
  # workspace dependencies it must build first (matrix.deps).
  discover:
    name: Discover
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      typecheckJobs: ${{ steps.discover.outputs.typecheckJobs }}
      buildJobs: ${{ steps.discover.outputs.buildJobs }}
      testJobs: ${{ steps.discover.outputs.testJobs }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Test the discovery script
        run: node --test '.github/scripts/**/*.test.mjs'
      - id: discover
        run: node .github/scripts/discover-jobs.mjs

  # Cheap, independent checks fan out per package and run in parallel — a
  # typecheck failure in one package doesn't hide a build break in another.
  typecheck:
    name: Typecheck (${{ matrix.name }})
    needs: [discover]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.typecheckJobs) }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      # A package typechecks against the published dist of its workspace deps
      # (e.g. testing → creact's dist/*.d.ts), so build those first. Empty for
      # packages with no workspace deps. --ignore-scripts keeps it to the build.
      - name: Build workspace dependencies
        if: matrix.deps != ''
        run: |
          for dep in ${{ matrix.deps }}; do
            npm run build -w "$dep" --ignore-scripts
          done
      - run: npm run typecheck -w ${{ matrix.path }}

  build:
    name: Build (${{ matrix.name }})
    needs: [discover]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.buildJobs) }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      # No dependency pre-build: a package that compiles against another
      # package's dist declares it as a project reference, so `npm run build`
      # (tsc -b) builds that dependency itself. This validates each package
      # builds STANDALONE — exactly as it is built at publish time.
      # --ignore-scripts matches publish (no prepublishOnly re-running the suite).
      - run: npm run build -w ${{ matrix.path }} --ignore-scripts

  test:
    name: Test (${{ matrix.name }})
    needs: [discover]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.testJobs) }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run test:coverage -w ${{ matrix.path }}
      - name: Upload package coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.safeName }}
          path: ${{ matrix.path }}/coverage/coverage-final.json
          if-no-files-found: ignore
          retention-days: 14

  # Build and validate every publishable package exactly as the release does —
  # isolated, as published — by running the SAME script the release runs, with
  # DRY_RUN so nothing is published/tagged. Because this workflow also runs on
  # the release branch (release.yml calls it as its quality gate), the check runs
  # identically on PRs and on release, and the release publish step runs this
  # same script with DRY_RUN=false. A package that only breaks at publish time
  # (e.g. one that cannot build standalone) therefore fails here, on the PR.
  packages:
    name: Packages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Build each package as published and validate packaging
        shell: bash
        env:
          DRY_RUN: "true"
        run: bash .github/scripts/publish-packages.sh

  # Combine each package's coverage into one file for fallow's CRAP scoring.
  coverage-merge:
    name: Merge coverage
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Download per-package coverage
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-test-coverage-*
          path: coverage-parts
      - name: Merge into coverage/coverage-final.json
        run: |
          mkdir -p coverage
          node scripts/merge-coverage.mjs coverage/coverage-final.json \
            $(find coverage-parts -name coverage-final.json)
      - name: Upload merged coverage (consumed by the fallow job)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-merged
          path: coverage/coverage-final.json
          retention-days: 14

  # Fallow static analysis: dead code, duplication, complexity/CRAP health,
  # and a changed-files audit. Config + justified ignores in .fallowrc.jsonc.
  fallow:
    name: Fallow
    needs: [coverage-merge]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          # audit diffs changed files against the base branch
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      # fallow resolves imports and dependency usage through node_modules —
      # without an install it warns and degrades to less accurate results
      - run: npm ci
      - name: Download merged coverage for exact CRAP scores
        uses: actions/download-artifact@v4
        with:
          name: coverage-merged
          path: coverage
      # Each aspect both hard-gates the build (non-zero exit fails the job)
      # AND appends its full report to fallow-report.txt, so the Grok review
      # sees all four — dead code, duplication, health (score, large
      # functions, hotspots, coupling), and the changed-files audit — not
      # just the audit. pipefail keeps the gate: a failing aspect fails here.
      - name: Dead code
        run: |
          set -o pipefail
          { echo "=== DEAD CODE ==="; npx --yes fallow@3.3.0 dead-code; echo; } 2>&1 | tee -a fallow-report.txt
      - name: Duplication
        run: |
          set -o pipefail
          { echo "=== DUPLICATION ==="; npx --yes fallow@3.3.0 dupes; echo; } 2>&1 | tee -a fallow-report.txt
      - name: Health (CRAP < 15, zero findings)
        run: |
          set -o pipefail
          { echo "=== HEALTH ==="; npx --yes fallow@3.3.0 health --coverage coverage/coverage-final.json; echo; } 2>&1 | tee -a fallow-report.txt
      - name: Audit changed files (PRs)
        if: github.event_name == 'pull_request'
        run: |
          set -o pipefail
          { echo "=== AUDIT (changed files vs ${GITHUB_BASE_REF}) ==="; npx --yes fallow@3.3.0 audit --base "origin/${GITHUB_BASE_REF}" --coverage coverage/coverage-final.json; echo; } 2>&1 | tee -a fallow-report.txt
      - name: Upload fallow report (consumed by the Grok review)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: fallow-report
          path: fallow-report.txt
          retention-days: 14

  # AI review of the full fallow report — all four aspects (dead code,
  # duplication, health, changed-files audit), never the PR diff: Grok reads
  # fallow's semantic findings as a seasoned release gatekeeper with full
  # autonomy: its proceed/block verdict IS the gate, and the analysis is
  # published to the PR either way (one comment, edited in place on re-runs).
  # The rubric lives (versioned) in .github/prompts/fallow-review.md.
  grok-review:
    name: Grok Review
    needs: [fallow]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write # verdict comment
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          # Only the versioned review prompt is needed from the repo
          sparse-checkout: .github/prompts
      - name: Download fallow report
        uses: actions/download-artifact@v4
        with:
          name: fallow-report
      - name: Ask Grok for a verdict
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: |
          # Strict schema: the model must reason through `analysis` before
          # committing to `verdict` (field order is part of the contract)
          jq -n --rawfile system .github/prompts/fallow-review.md \
                --rawfile report fallow-report.txt '{
            model: "grok-4.5",
            temperature: 0,
            max_tokens: 1500,
            response_format: {
              type: "json_schema",
              json_schema: {
                name: "fallow_review_verdict",
                strict: true,
                schema: {
                  type: "object",
                  properties: {
                    analysis: {type: "string"},
                    concerns: {type: "array", items: {type: "string"}},
                    verdict: {type: "string", enum: ["proceed", "block"]},
                    summary: {type: "string"}
                  },
                  required: ["analysis", "concerns", "verdict", "summary"],
                  additionalProperties: false
                }
              }
            },
            messages: [
              {role: "system", content: $system},
              {role: "user", content: $report}
            ]
          }' > request.json
          curl -sS --fail-with-body https://api.x.ai/v1/chat/completions \
            -H "Authorization: Bearer ${XAI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d @request.json > response.json
          jq -e -r '.choices[0].message.content' response.json > verdict.json
          # A malformed verdict fails loudly rather than silently passing
          jq -e '.verdict and .summary' verdict.json > /dev/null
      - name: Publish the verdict (summary + PR comment, edited in place)
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          MARKER="<!-- grok-fallow-review -->"
          {
            echo "$MARKER"
            echo "### 🤖 Grok fallow review — **$(jq -r .verdict verdict.json)**"
            echo
            jq -r .summary verdict.json
            echo
            jq -r '(.concerns // [])[] | "- " + .' verdict.json
            echo
            echo "<sub>Reviews the full fallow report — dead code, duplication, health, and audit. Re-runs edit this comment.</sub>"
          } > comment.md
          cat comment.md >> "$GITHUB_STEP_SUMMARY"

          # Upsert: edit the existing verdict comment instead of stacking
          EXISTING_ID=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            --paginate --jq "[.[] | select(.body | startswith(\"$MARKER\"))][0].id // empty")
          if [ -n "$EXISTING_ID" ]; then
            gh api -X PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${EXISTING_ID}" \
              --field body=@comment.md > /dev/null
            echo "Updated existing verdict comment ${EXISTING_ID}"
          else
            gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file comment.md
          fi
      - name: Gate on the verdict
        run: |
          VERDICT=$(jq -r .verdict verdict.json)
          if [ "$VERDICT" != "proceed" ]; then
            echo "::error::Grok blocked this change: $(jq -r .summary verdict.json)"
            exit 1
          fi
          echo "Grok verdict: proceed"

  # Single stable aggregate — THE required status check for branch
  # protection. Required checks are selected per job, and the typecheck/build/
  # test matrices' job names drift as packages are added; this one context
  # stays stable: "Code Quality / Quality Gate". A matrix job's result here is
  # the aggregate of all its legs (success only if every package passed).
  # `if: always()` is load-bearing: without it a failing job would make this
  # SKIP, and GitHub treats a skipped required check as a PASS.
  quality-gate:
    name: Quality Gate
    needs: [typecheck, build, test, packages, fallow, grok-review]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Verify all checks passed
        env:
          TYPECHECK: ${{ needs.typecheck.result }}
          BUILD: ${{ needs.build.result }}
          TEST: ${{ needs.test.result }}
          PACKAGES: ${{ needs.packages.result }}
          FALLOW: ${{ needs.fallow.result }}
          GROK: ${{ needs['grok-review'].result }}
        run: |
          FAILED=""
          check() { # name result pr_only — pr_only jobs may be skipped on push
            if [ "$2" = "success" ]; then return; fi
            if [ "$3" = "pr-only" ] && [ "$GITHUB_EVENT_NAME" != "pull_request" ] && [ "$2" = "skipped" ]; then return; fi
            FAILED="$FAILED $1=$2"
          }
          check typecheck "$TYPECHECK" always
          check build "$BUILD" always
          check test "$TEST" always
          check packages "$PACKAGES" always
          check fallow "$FALLOW" always
          check grok-review "$GROK" pr-only
          if [ -n "$FAILED" ]; then
            echo "::error::Quality gate failed:$FAILED"
            exit 1
          fi
          echo "All quality checks passed."
